name: Provision with Terraform
run-name: Provision with Terraform

on:
 workflow_dispatch:
   inputs:
     hubEnv:
       description: Select target hub and stage
       required: true
       type: choice
       options:
         - 'BACKEND_EMEA_TEST'


jobs:
 properties:
   #    TODO call datacenterMap reusable workflow to get AWS_ACCOUNT, PROFILE, REGION and other variables based on hubEnv input
    name: Load datacenter map
    uses: ./.github/workflows/datacenterMap.yml
    with:
      hubEnv: ${{ inputs.hubEnv }}
    secrets: inherit


 terraform:
   #    TODO Checkout, Install Terraform, Configure AWS profile, Run Terraform apply with setup_new_region.sh script and w2.sh script to provision infrastructure in the new region
    name: Provision infrastructure (Terraform)
    runs-on: ubuntu-latest
    needs: properties
    env:
      AWS_ACCOUNT: ${{ needs.properties.outputs.AWS_ACCOUNT }}
      AWS_PROFILE: ${{ needs.properties.outputs.PROFILE }}
      AWS_REGION:  ${{ needs.properties.outputs.REGION }}
      AWS_KEY:     ${{ secrets[format('{0}_AWS_KEY', inputs.hubEnv)] }}
      AWS_SECRET:  ${{ secrets[format('{0}_AWS_SECRET', inputs.hubEnv)] }}

    steps:
      # 1) Checkout
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # clone with versions

      # 2) Install Terraform
      - name: Install Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.7
          terraform_wrapper: false # extra logs

      # 3) Configure AWS profile 
      - name: Configure AWS profile
        shell: bash
        run: |
          mkdir -p ~/.aws
          {
            echo "[${AWS_PROFILE}]"
            echo "aws_access_key_id = ${AWS_KEY}"
            echo "aws_secret_access_key = ${AWS_SECRET}"
          } > ~/.aws/credentials
          {
            echo "[profile ${AWS_PROFILE}]"
            echo "region = ${AWS_REGION}"
            echo "output = json"
          } > ~/.aws/config
          # eksport profilu i regionu na potrzeby skryptów
          echo "AWS_PROFILE=${AWS_PROFILE}" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=${AWS_REGION}" >> $GITHUB_ENV

      # 4) Run Terraform apply
      - name: Provision infrastructure (apply)
        shell: bash
        run: |
          set -euo pipefail
          cd aws-infrastructure/terraform
          chmod +x setup_new_region.sh
          chmod +x w2.sh
          ./setup_new_region.sh w2.sh "${AWS_PROFILE}" "${AWS_REGION}" apply -auto-approve
          